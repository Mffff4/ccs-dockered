services:
  ccs:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "-lc", "ccs config --host 0.0.0.0 --port 3000"]
    expose:
      - "3000"
    volumes:
      - ccs_/root/.ccs
      - ./workspace:/workspace
    stdin_open: true
    tty: true

volumes:
  ccs_
